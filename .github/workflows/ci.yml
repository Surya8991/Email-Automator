name: CI

on:
  push:
    branches: [main]
  pull_request:
  # Weekly Monday-morning audit so a freshly disclosed CVE in a transitive
  # dep surfaces on its own, not at the next deploy attempt.
  schedule:
    - cron: '0 6 * * 1'

jobs:
  web:
    name: web (Next.js)
    runs-on: ubuntu-latest
    env:
      AUTH_SECRET: test-secret-must-be-at-least-16-chars-long
      DATABASE_URL: ./data/test.db
      SMTP_USER: ci@example.com
      SMTP_PASS: x
      EMAIL_FROM: ci@example.com
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with: { node-version: 20, cache: npm }
      - run: npm install --legacy-peer-deps
      # FAIL the build on any high/critical CVE. Vercel does the same check
      # at deploy time and silently blocks deploys (which is how we landed
      # in the 404 state with Next 15.0.3). Surfacing it here makes it
      # visible at PR time instead of at production deploy.
      - name: Security audit (high/critical = blocking)
        run: npm audit --audit-level=high
      - run: npm run db:migrate
      - run: npm run typecheck
      - run: npm run lint --if-present
        continue-on-error: true
      - run: npm test
      - run: npx playwright install --with-deps chromium
      - run: npm run e2e -- --reporter=line
        continue-on-error: true
